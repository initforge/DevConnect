services:
  # ========== MINIO (S3 Storage) ==========
  minio:
    image: minio/minio:latest
    container_name: devconnect_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=devconnect123
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - devconnect_network

  # ========== NGINX (Reverse Proxy) ==========
  nginx:
    image: nginx:alpine
    container_name: devconnect_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devconnect_network

  # ========== BACKEND (NestJS API) ==========
  backend:
    image: devconnect/backend:local
    container_name: devconnect_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://devconnect:devconnect123@postgres:5432/devconnect
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=devconnect-secret-key-2024
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=devconnect123
      - MINIO_BUCKET=devconnect
      - PISTON_URL=http://piston:2000
      - AI_WORKER_URL=${AI_WORKER_URL:-}
      - AI_WORKER_SECRET=${AI_WORKER_SECRET:-}
      - AI_TIMEOUT_MS=30000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - devconnect_network

  # ========== POSTGRESQL ==========
  postgres:
    image: postgres:16-alpine
    container_name: devconnect_postgres
    environment:
      - POSTGRES_DB=devconnect
      - POSTGRES_USER=devconnect
      - POSTGRES_PASSWORD=devconnect123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devconnect -d devconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devconnect_network

  # ========== REDIS ==========
  redis:
    image: redis:7-alpine
    container_name: devconnect_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devconnect_network

  # ========== PISTON (Code Execution Engine) ==========
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: devconnect_piston
    privileged: true
    tmpfs:
      - /piston/jobs:exec
      - /tmp:exec
    restart: unless-stopped
    networks:
      - devconnect_network

volumes:
  pgdata:
  redisdata:
  miniodata:
  uploads:

networks:
  devconnect_network:
    driver: bridge
