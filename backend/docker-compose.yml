services:
  backend:
    image: devconnect/backend:local
    container_name: devconnect_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://devconnect:devconnect123@postgres:5432/devconnect
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - devconnect_network

  postgres:
    image: postgres:16-alpine
    container_name: devconnect_postgres
    environment:
      POSTGRES_DB: devconnect
      POSTGRES_USER: devconnect
      POSTGRES_PASSWORD: devconnect123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devconnect -d devconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - devconnect_network

  redis:
    image: redis:7-alpine
    container_name: devconnect_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - devconnect_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devconnect_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devconnect.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - devconnect_network
    profiles:
      - debug

volumes:
  pgdata:
  redisdata:

networks:
  devconnect_network:
    driver: bridge